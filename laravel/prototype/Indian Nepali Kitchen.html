<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Nepali Kitchen</title>
<link rel="stylesheet" href="assets/theme.css">
<style>
  #root { min-height: 100vh; }
  .cust-burger { display: none; }
  @media (max-width: 1080px) {
    .cust-navlinks { display: none !important; }
    .cust-reserve-btn { display: none !important; }
    .cust-burger { display: grid !important; }
  }
  @media (max-width: 860px) {
    .cust-story-grid, .cust-dish-grid, .cust-band, .cust-cater-grid, .cust-rev-grid,
    .cust-order-grid, .cust-checkout-grid, .cust-reserve-grid, .cust-pkg-grid,
    .cust-contact-grid, .cust-promo, .cust-foot-grid,
    .cust-about-hero, .cust-val-grid, .cust-gift-grid { grid-template-columns: 1fr !important; }
    .cust-team-grid, .cust-stat-band { grid-template-columns: repeat(2,1fr) !important; }
    .cust-band > * { order: initial !important; }
    .cust-dish-grid, .cust-cater-grid, .cust-rev-grid { gap: 18px !important; }
  }
  @media (max-width: 600px) {
    section, .cust-pad { padding-left: 20px !important; padding-right: 20px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="assets/icons.jsx"></script>
<script type="text/babel" src="assets/ui.jsx"></script>
<script type="text/babel" src="customer/data.jsx"></script>
<script type="text/babel" src="customer/shell.jsx"></script>
<script type="text/babel" src="customer/home.jsx"></script>
<script type="text/babel" src="customer/order.jsx"></script>
<script type="text/babel" src="customer/pages.jsx"></script>
<script type="text/babel" src="customer/extras.jsx"></script>
<script type="text/babel" src="customer/app.jsx"></script>
</body>
</html>
