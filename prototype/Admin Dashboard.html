<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Nepali Kitchen — Admin</title>
<link rel="stylesheet" href="assets/theme.css">
<style>
  #root { min-height: 100vh; }
  .adm-burger { display: none; }
  table tr { transition: background .15s; }
  @media (max-width: 1100px) {
    .adm-stat-grid { grid-template-columns: repeat(2,1fr) !important; }
    .adm-over-grid, .adm-toast-grid, .adm-cal-wrap { grid-template-columns: 1fr !important; }
    .adm-kanban { grid-template-columns: repeat(2,1fr) !important; }
    .adm-inbox { grid-template-columns: 1fr !important; height: auto !important; }
    .adm-gallery-grid { grid-template-columns: repeat(3,1fr) !important; }
    .adm-perm-grid, .adm-task-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 920px) {
    .adm-burger { display: grid !important; place-items: center; }
    .adm-sidebar { position: fixed !important; left: 0; top: 0; transform: translateX(-100%); transition: transform .3s; }
    .adm-sidebar.open { transform: none; }
    .adm-scrim { display: block !important; }
  }
  @media (max-width: 640px) {
    .adm-stat-grid, .adm-kanban, .adm-gallery-grid { grid-template-columns: 1fr !important; }
    #adm-main { padding: 20px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="assets/icons.jsx"></script>
<script type="text/babel" src="assets/ui.jsx"></script>
<script type="text/babel" src="customer/data.jsx"></script>
<script type="text/babel" src="admin/data.jsx"></script>
<script type="text/babel" src="admin/widgets.jsx"></script>
<script type="text/babel" src="admin/shell.jsx"></script>
<script type="text/babel" src="admin/overview.jsx"></script>
<script type="text/babel" src="admin/pages1.jsx"></script>
<script type="text/babel" src="admin/pages2.jsx"></script>
<script type="text/babel" src="admin/app.jsx"></script>
</body>
</html>
